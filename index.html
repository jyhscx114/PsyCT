<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <meta name="keywords" content="Psy-CT,MMPI,心理测评" />
  <meta name="description" content="Psy-CT心理测评系统 — 基于 MMPI 的多维人格测评" />
  <title>Psy-CT 心理测评系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #060b14;
      --panel: rgba(12, 22, 40, 0.72);
      --border: rgba(0, 212, 255, 0.22);
      --cyan: #00d4ff;
      --cyan-dim: rgba(0, 212, 255, 0.15);
      --purple: #7c3aed;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    body::after {
      content: '';
      position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
      width: 80%; height: 50%;
      background: radial-gradient(ellipse, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    #app {
      position: relative; z-index: 1;
      height: 100vh; max-height: 100vh;
      display: flex; flex-direction: column;
      padding: 6px 10px 8px;
      overflow: hidden;
      max-width: 1400px;
      margin: 0 auto;
    }
    .app-top { flex-shrink: 0; }
    .app-top h1 { font-size: 1.15rem; margin: 0; line-height: 1.3; }
    .app-top .sub { font-size: 10px; margin: 0; }
    .toolbar-row {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 6px;
      margin-top: 6px;
    }
    .toolbar-row .glass { padding: 6px 10px; border-radius: 8px; margin: 0; }
    .progress-inline { flex: 1; min-width: 120px; max-width: 280px; }
    .app-main {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 8px;
      margin-top: 6px;
    }
    @media (max-width: 900px) {
      html, body { overflow: auto; height: auto; }
      #app { height: auto; max-height: none; overflow: visible; }
      .app-main { grid-template-columns: 1fr; }
      .scores-panel .scores-wrap { max-height: 200px; }
    }
    .panel-col {
      min-height: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-col .glass { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 8px 10px; margin: 0; }
    .panel-title {
      font-size: 11px; font-weight: 600; color: #cbd5e1;
      margin-bottom: 4px; flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 8px #22c55e;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .font-tech { font-family: 'Orbitron', monospace; letter-spacing: 0.06em; }
    .glass {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.06), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-group { display: inline-flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .btn-group button {
      border: none; padding: 7px 18px; cursor: pointer;
      background: rgba(0,0,0,0.3); color: var(--muted);
      transition: all 0.2s; font-size: 13px; font-weight: 500;
    }
    .btn-group button:not(:first-child) { border-left: 1px solid var(--border); }
    .btn-group button:hover { background: var(--cyan-dim); color: var(--text); }
    .btn-group button.active {
      background: linear-gradient(135deg, rgba(0,212,255,0.35), rgba(124,58,237,0.35));
      color: #fff; box-shadow: 0 0 12px rgba(0, 212, 255, 0.35);
    }
    .action-btn {
      padding: 8px 16px; border: 1px solid var(--border); cursor: pointer;
      background: rgba(0,0,0,0.25); color: var(--text); font-size: 13px;
      border-radius: 8px; transition: all 0.2s; font-weight: 500;
    }
    .action-btn:hover:not(:disabled) { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .action-btn.danger { border-color: rgba(248,113,113,0.4); color: #fca5a5; }
    .action-btn.danger:hover { background: rgba(239,68,68,0.15); }
    .progress-track { background: rgba(0,0,0,0.4); border-radius: 999px; height: 6px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
      transition: width 0.35s ease;
    }
    /* 量表区：占满左栏，可滚动、字号可读 */
    .scores-wrap {
      flex: 1; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: var(--cyan) rgba(0,0,0,0.2);
      padding-right: 4px;
    }
    .scores-wrap::-webkit-scrollbar { width: 6px; }
    .scores-wrap::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 4px; }
    .subject-bar {
      flex-shrink: 0;
      margin-top: 6px;
      padding: 10px 12px;
      border: 1px solid rgba(0, 212, 255, 0.35);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(124, 58, 237, 0.08));
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.08);
    }
    .subject-bar-title {
      font-size: 12px; font-weight: 600; color: var(--cyan);
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .subject-fields {
      display: flex; flex-wrap: wrap; align-items: flex-end; gap: 10px 16px;
    }
    .field-block label {
      display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; font-weight: 500;
    }
    .field-block input {
      width: 140px; padding: 8px 10px; font-size: 14px;
      border: 1px solid var(--border); border-radius: 8px;
      background: rgba(0, 0, 0, 0.45); color: #fff;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-block input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
    }
    .field-block input.age-input { width: 72px; }
    .gender-block .btn-group button { padding: 10px 22px; font-size: 14px; }
    .btn-print {
      padding: 10px 20px; font-size: 14px; font-weight: 600;
      border: 1px solid #0ea5e9; border-radius: 8px; cursor: pointer;
      background: linear-gradient(135deg, #0284c7, #0369a1);
      color: #fff; box-shadow: 0 2px 12px rgba(14, 165, 233, 0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-print:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(14, 165, 233, 0.45); }
    .score-table {
      width: 100%; border-collapse: collapse; font-size: 11px;
    }
    .score-table thead th {
      position: sticky; top: 0; z-index: 2;
      background: rgba(12, 22, 40, 0.98);
      padding: 5px 6px; text-align: left; font-weight: 600;
      color: var(--muted); border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    .score-table thead th:nth-child(n+3) { text-align: center; width: 36px; }
    .score-table tbody tr {
      border-bottom: 1px solid rgba(0, 212, 255, 0.08);
      transition: background 0.15s;
    }
    .score-table tbody tr.flash { background: rgba(0, 212, 255, 0.14); }
    .score-table tbody tr:hover { background: rgba(0, 212, 255, 0.06); }
    .score-table td { padding: 4px 6px; vertical-align: middle; }
    .score-table .code {
      font-family: 'Orbitron', monospace; font-size: 10px;
      color: var(--cyan); white-space: nowrap; width: 42px;
    }
    .score-table .label { color: #e2e8f0; line-height: 1.3; min-width: 0; }
    .score-table .num { text-align: center; font-variant-numeric: tabular-nums; color: #94a3b8; }
    .score-table .num.t-high { color: #fbbf24; font-weight: 700; }
    .score-group-title {
      font-size: 10px; font-weight: 600; color: var(--cyan);
      letter-spacing: 0.05em;
      padding: 6px 6px 4px; border-left: 3px solid var(--cyan);
      margin: 8px 0 2px; background: rgba(0, 212, 255, 0.05);
    }
    /* 题目卡片 */
    .card-stage { position: relative; flex: 1; min-height: 140px; overflow: hidden; }
    .question-card {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 24px 20px; text-align: center;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
    }
    .question-card.slide-out-left { transform: translateX(-120%); opacity: 0; }
    .question-card.slide-out-right { transform: translateX(120%); opacity: 0; }
    .question-card.slide-in { animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideIn {
      from { transform: translateX(80px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .q-num {
      font-family: 'Orbitron', monospace;
      font-size: 10px; color: var(--cyan);
      border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px;
      margin-bottom: 10px;
    }
    .q-text { font-size: 15px; line-height: 1.55; color: #f1f5f9; max-width: 100%; margin-bottom: 14px; padding: 0 8px; }
    .answer-pair { display: flex; gap: 12px; }
    .answer-big {
      min-width: 88px; padding: 10px 24px; border-radius: 8px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.35);
      color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .answer-big:hover { border-color: var(--cyan); transform: translateY(-2px); }
    .answer-big.yes.active { background: rgba(16,185,129,0.25); border-color: #10b981; color: #6ee7b7; box-shadow: 0 0 20px rgba(16,185,129,0.3); }
    .answer-big.no.active { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #fca5a5; box-shadow: 0 0 20px rgba(239,68,68,0.25); }
    .answer-big kbd {
      display: inline-block; margin-left: 4px; padding: 1px 4px;
      font-size: 9px; font-family: 'Orbitron', monospace;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px; vertical-align: middle; opacity: 0.85;
    }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; gap: 6px; flex-shrink: 0; }
    .kbd-hints {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px 12px;
      margin-top: 8px; padding: 8px 10px; border-radius: 8px;
      background: rgba(0, 212, 255, 0.06); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted); flex-shrink: 0;
    }
    .kbd-hints .hint-group { display: flex; align-items: center; gap: 4px; }
    .kbd-hints kbd {
      display: inline-block; min-width: 20px; padding: 2px 6px;
      font-family: 'Orbitron', monospace; font-size: 10px; text-align: center;
      background: rgba(0,0,0,0.45); border: 1px solid var(--border);
      border-radius: 4px; color: var(--cyan); box-shadow: 0 1px 0 rgba(255,255,255,0.08);
    }
    .kbd-hints .sep { color: #475569; margin: 0 2px; }
    .mmpi-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px; font-size: 10px;
      background: rgba(124, 58, 237, 0.2); border: 1px solid rgba(124, 58, 237, 0.4);
      color: #c4b5fd;
    }
    .corner-glow {
      position: absolute; width: 80px; height: 80px;
      border: 1px solid var(--border); opacity: 0.5; pointer-events: none;
    }
    .corner-glow.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
    .corner-glow.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }
    @media print {
      body::before, body::after { display: none !important; }
    }
  </style>
</head>

  // ======================== CALCULATION ========================
  function ifPairMatches(answers, pair) {
    const entries = Object.entries(pair);
    const k1 = parseInt(entries[0][0], 10);
    const v1 = entries[0][1];
    const k2 = parseInt(entries[1][0], 10);
    const v2 = entries[1][1];
    return answers[k1 - 1] === v1 && answers[k2 - 1] === v2;
  }

  function calculateVrin(answers) {
    return vrinScale.positive.reduce((acc, pair) => ifPairMatches(answers, pair) ? acc + 1 : acc, 0);
  }

  function calculateTrin(answers) {
    const pos = trinScale.positive.reduce((acc, pair) => acc + Number(ifPairMatches(answers, pair)), 0);
    const neg = trinScale.negative.reduce((acc, pair) => acc + Number(ifPairMatches(answers, pair)), 0);
    return pos - neg + 10;
  }

  function calculateRawScale(answers, scaleId, gender) {
    if (scaleId === 'VRIN') return calculateVrin(answers);
    if (scaleId === 'TRIN') return calculateTrin(answers);
    const resolvedScale = scaleId === 'Mf' ? `Mf-${gender[0]}` : scaleId;
    const scale = mainScales[resolvedScale];
    if (!scale) return 0;
    const positive = scale.positive.reduce((acc, pos) => (answers[pos - 1] ? acc + 1 : acc), 0);
    const negative = scale.negative.reduce((acc, pos) => (answers[pos - 1] === false ? acc + 1 : acc), 0);
    return positive + negative;
  }

  function calculateKCorrected(scaleValues) {
    const result = {};
    for (const [scaleId, scaleValue] of Object.entries(scaleValues)) {
      result[scaleId] = scaleValue + Math.round(scaleValues.K * (kCorrections[scaleId] || 0));
    }
    return result;
  }

  function calculateTenScales(scaleValues, gender) {
    const result = {};
    for (const [scale, value] of Object.entries(scaleValues)) {
      const ts = tenScale[gender]?.[scale];
      result[scale] = ts ? (ts[value] ?? value) : value;
    }
    return result;
  }

  function calculateResults(answers, gender, mode) {
    const allScales = Object.values(scaleHierarchy).flat();
    const raw = {};
    for (const s of allScales) {
      raw[s] = calculateRawScale(answers, s, gender);
    }
    if (mode === 'raw') return raw;
    const k = calculateKCorrected(raw);
    if (mode === 'k') return k;
    return calculateTenScales(k, gender);
  }

  let state = {

    age: '',
    gender: 'male',

  function loadState() {
    try {
      const saved = localStorage.getItem('psy-ct-data') || localStorage.getItem('mmpi2-data');
      if (saved) {
        const parsed = JSON.parse(saved);
        state.name = parsed.name || '';
        state.age = parsed.age != null ? String(parsed.age) : '';
        state.gender = parsed.gender || 'male';
        state.currentQuestion = Math.min(
          Math.max(0, parsed.currentQuestion ?? parsed.page ?? 0),
          QUESTION_COUNT - 1
        );
        state.answers = parsed.answers || new Array(QUESTION_COUNT).fill(null);
      }
    } catch(e) {}
  }

  function saveState() {
    try {
      localStorage.setItem('psy-ct-data', JSON.stringify(state));
    } catch(e) {}
  }

  let lastScoreSnapshot = null;

  function computeAllScores() {
    const raw = calculateResults(state.answers, state.gender, 'raw');
    const k = calculateKCorrected(raw);
    const ten = calculateTenScales(k, state.gender);
    return { raw, k, ten };
  }

  function renderCompactScores(raw, k, ten) {
    const tableHead = `<thead><tr><th>代号</th><th>分量表名称</th><th>原</th><th>K</th><th>T</th></tr></thead>`;
    return Object.entries(scaleHierarchy).map(([group, scales]) => `

        <table class="score-table">
          ${tableHead}
          <tbody>
            ${scales.map(s => {
              const t = ten[s];
              const tClass = t >= 70 ? ' t-high' : '';
              const prev = lastScoreSnapshot;
              const changed = prev && (prev.raw[s] !== raw[s] || prev.k[s] !== k[s] || prev.ten[s] !== ten[s]);
              return `<tr class="${changed ? 'flash' : ''}" data-scale="${s}">
                <td class="code">${s}</td>
                <td class="label">${getScaleLabel(s)}</td>
                <td class="num">${raw[s]}</td>
                <td class="num">${k[s]}</td>
                <td class="num${tClass}">${t}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `).join('');
  }

  function getProgressHtml() {
    const remaining = state.answers.filter(a => a === null).length;
    const answered = QUESTION_COUNT - remaining;
    const progress = Math.round((answered / QUESTION_COUNT) * 100);
    const status = remaining === 0

    return { answered, progress, status };
  }

    if (!wrap) return;
    const scores = computeAllScores();
    wrap.innerHTML = renderCompactScores(scores.raw, scores.k, scores.ten);
    lastScoreSnapshot = scores;
    setTimeout(() => {

    const cq = state.currentQuestion;
    const canPrev = cq > 0;
    const canNext = cq < QUESTION_COUNT - 1;
    host.innerHTML = `
      ${renderQuestionCard()}
      <div class="nav-row">
        <button type="button" class="action-btn" ${canPrev ? '' : 'disabled'} onclick="navQuestion(-1)">← 上一题</button>
        <span class="text-[10px] text-slate-500 font-tech">${cq + 1} / ${QUESTION_COUNT}</span>
        <button type="button" class="action-btn" ${canNext ? '' : 'disabled'} onclick="navQuestion(1)">下一题 →</button>
      </div>
      <div class="kbd-hints">
        <span class="hint-group"><kbd>Y</kbd><span class="sep">/</span><kbd>1</kbd> 作答「是」</span>
        <span class="hint-group"><kbd>N</kbd><span class="sep">/</span><kbd>0</kbd> 作答「否」</span>
        <span class="hint-group"><kbd>←</kbd><kbd>→</kbd> 切换题目</span>
        <span class="hint-group" style="color:#64748b">答后自动下一题 · 可左右滑动</span>
      </div>
    `;
    state.slideDir = null;
    bindSwipe();
  }

  function renderShell() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="app-top">
        <div style="display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:6px">
          <div>
            <h1 class="font-tech font-bold text-white" style="text-shadow:0 0 16px rgba(0,212,255,0.4)">Psy-CT 心理测评系统</h1>
            <p class="sub text-slate-500">基于 MMPI 量表体系 · 请如实作答</p>
          </div>
          <div class="glass progress-inline" id="progress-panel" style="min-width:200px"></div>
        </div>
        <div class="subject-bar">
          <div class="subject-bar-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            受测者信息（请填写后再作答）
          </div>
          <div class="subject-fields">
            <div class="field-block">
              <label for="input-name">姓名</label>
              <input type="text" id="input-name" placeholder="请输入姓名" value="${(state.name || '').replace(/"/g, '&quot;')}"
                oninput="setSubject('name', this.value)" />
            </div>
            <div class="field-block">
              <label for="input-age">年龄</label>
              <input type="number" class="age-input" id="input-age" min="1" max="120" placeholder="岁"
                value="${(state.age || '').replace(/"/g, '&quot;')}"
                oninput="setSubject('age', this.value)" />
            </div>
            <div class="field-block gender-block">
              <label>性别（影响常模）</label>
              <div class="btn-group">
                <button type="button" id="btn-female" onclick="setGender('female')">♀ 女性</button>
                <button type="button" id="btn-male" onclick="setGender('male')">♂ 男性</button>
              </div>
            </div>
            <button type="button" class="btn-print" onclick="printReport()">🖨 打印报告单</button>
            <button type="button" class="action-btn danger" onclick="resetAnswers()">重置测评</button>
          </div>
        </div>
      </div>
      <div class="app-main">
        <div class="panel-col scores-panel">
          <div class="glass">
            <div class="panel-title">
              <span>量表分数 <span style="color:#64748b;font-weight:400">代号 + 分量表名</span></span>
              <span style="display:flex;align-items:center;gap:5px;font-size:10px;color:#64748b">
                <span class="live-dot"></span>实时
              </span>
            </div>
            <div class="scores-wrap" id="scores-wrap"></div>
          </div>
        </div>
        <div class="panel-col">
          <div class="glass">
            <div class="panel-title"><span>题目作答</span></div>
            <div id="question-host" style="flex:1;min-height:0;display:flex;flex-direction:column"></div>
          </div>
        </div>
      </div>
    `;
    syncSubjectInputs();
    refreshProgress();
    refreshScores();
    refreshQuestion();
  }

  function updateGenderButtons() {
    const f = document.getElementById('btn-female');
    const m = document.getElementById('btn-male');
    if (f) f.classList.toggle('active', state.gender === 'female');
    if (m) m.classList.toggle('active', state.gender === 'male');
  }

  // ======================== ACTIONS ========================
  function setGender(g) {
    state.gender = g;
    saveState();
    updateGenderButtons();
    refreshScores();
  }

  function navQuestion(delta, animate) {
    const next = state.currentQuestion + delta;
    if (next < 0 || next >= QUESTION_COUNT) return;
    if (animate) {
      const card = document.getElementById('question-card');
      if (card) {
        card.classList.add(delta > 0 ? 'slide-out-left' : 'slide-out-right');
        state.slideDir = delta > 0 ? 'next' : 'prev';
        setTimeout(() => {
          state.currentQuestion = next;
          saveState();
          state.slideDir = delta > 0 ? 'next' : 'prev';
          refreshQuestion();
        }, 260);
        return;
      }
    }
    state.currentQuestion = next;
    state.slideDir = delta > 0 ? 'next' : 'prev';
    saveState();
    refreshQuestion();
  }

  function setAnswer(index, value) {
    state.answers[index] = value;
    saveState();
    refreshScores();
    refreshProgress();
    const yesBtn = document.querySelector('.answer-big.yes');
    const noBtn = document.querySelector('.answer-big.no');
    if (yesBtn && noBtn) {
      yesBtn.classList.toggle('active', value === true);
      noBtn.classList.toggle('active', value === false);
    }
    if (index < QUESTION_COUNT - 1) {
      setTimeout(() => navQuestion(1, true), 180);
    } else {
      refreshProgress();
    }
  }

  function resetAnswers() {
    if (!window.confirm('确定要重置吗？所有回答将被清零。')) return;
    state.answers = new Array(QUESTION_COUNT).fill(null);
    state.currentQuestion = 0;
    lastScoreSnapshot = null;
    saveState();
    refreshScores();
    refreshProgress();
    refreshQuestion();
  }

  function goToFirstUnanswered() {
    const idx = state.answers.indexOf(null);
    if (idx === -1) return;
    state.currentQuestion = idx;
    state.slideDir = 'next';
    saveState();
    refreshQuestion();
  }

  let swipeHandler = null;
  function bindSwipe() {
    const stage = document.getElementById('card-stage');
    if (!stage) return;
    if (swipeHandler) {
      stage.removeEventListener('touchstart', swipeHandler.start);
      stage.removeEventListener('touchend', swipeHandler.end);
    }
    let startX = 0;
    const start = e => { startX = e.touches[0].clientX; };
    const end = e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 50) navQuestion(dx < 0 ? 1 : -1);
    };
    stage.addEventListener('touchstart', start, { passive: true });
    stage.addEventListener('touchend', end, { passive: true });
    swipeHandler = { start, end };
  }

  function handleKeydown(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    const key = e.key;
    const i = state.currentQuestion;
    if (key === 'y' || key === 'Y' || key === '1') {
      e.preventDefault();
      setAnswer(i, true);
      return;
    }
    if (key === 'n' || key === 'N' || key === '0') {
      e.preventDefault();
      setAnswer(i, false);
      return;
    }
    if (key === 'ArrowLeft') {
      e.preventDefault();
      navQuestion(-1);
      return;
    }
    if (key === 'ArrowRight') {
      e.preventDefault();
      navQuestion(1);
    }
  }

  document.addEventListener('keydown', handleKeydown);

  // ======================== INIT ========================
  loadState();
  renderShell();
  </script>
</body>
</html>
